[package]
name = "script"
version = "0.1.0"
edition = "2021"

[dependencies]
proofstamp-lib = { path = "../lib" }
sp1-sdk = { version = "6.3.1", features = ["profiling"] }
hex = "0.4.3"
tokio = { version = "1.0", features = ["full"] }
bincode = "1.3.3"
ed25519-dalek = { version = "2.0.0", features = ["rand_core"] }
rand = "0.8.5"
axum = "0.7.5"
tower-http = { version = "0.5.2", features = ["cors"] }
serde = { version = "=1.0.220", features = ["derive"] }
serde_json = "1.0.120"
base64 = "0.22.1"
[[bin]]
name = "prove"
path = "src/bin/prove.rs"

[[bin]]
name = "verify"
path = "src/bin/verify.rs"

[[bin]]
name = "cycle-check"
path = "src/bin/cycle-check.rs"

[[bin]]
name = "server"
path = "src/bin/server.rs"

[[bin]]
name = "gen-test-bundle"
path = "src/bin/gen-test-bundle.rs"
